      <!-- حساب مجموع الارباح للكتب المباعة والمستعارة  -->
<script>
  $(document).ready(function() {
    var total = 0;

    $(".total_price").each(function() {
      $(this).hide();
      var profit = $(this).text()
      total += parseInt(profit);
    });

    // $("#totalsalarys").text('$' + total);
            //or
    $("#totalsalarys").text($("#totalsalarys").text() + total);  // ادمج القيمة الناتجة من العمليات هنا مع قيمة الحقل نفسة في ملف(html)
  });

//---------------

  var sold_profit = 0;
  $(".totalSold").each(function(){
    var sold = $(this).text();
    sold_profit += parseInt(sold)
  });
  $(".salarySold").text(sold_profit);
  $(".salarySold").hide();

  
  var rental_profit = 0;
  $(".totalRental").each(function(){
    var rental = $(this).text();
    rental_profit += parseInt(rental)
  });
  $(".salaryRental").text(rental_profit);
  $(".salaryRental").hide();

</script>



    <!-- عملية اظهار الكتب بحسب التصنيف عند الضغط على زر اي تصنيف ويخفي الكتب الاخرى التي ليست من نفس الصنف الذي ضغط عليه -->
<script>
  $(".category").click(function(){
    let categoryId = $(this).data("category-id");    // get acategory_id 
    $(".bookhide").hide();     // hide all books
    let matched = $(".book" + categoryId);  //list get all books connected to the category
    if (matched.length > 0){
      matched.show();
    }
  });
</script>


      <!-- عرض الكتب بحسب حالتها اي الكتب المباعة او المستعارة او المتوفرة -->
<script>
    $(".status").click(function(){
    let book_status = $(this).data("status-book");    // get acategory_id 
    $(".bookhide").hide();     // hide all books
    let matched = $(".book" + book_status);  //list get all books connected to the category
    if (matched.length > 0){
      matched.show();
    }
  });
</script>


    <!-- عملية اظهار حقل ادخال اسم التصنيف عند الضغط على زر -->
<script>
  $("#category_input").hide()

  $("#add_category").click(function(){
    $("#category_input").show()
  });
  
  $("#back_category").click(function(){
    $("#category_input").hide()
  });
</script>
